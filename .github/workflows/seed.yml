name: Seed Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm (this runs ALL seed files against the target database)'
        required: true

jobs:
  seed:
    name: Run DB Seed
    runs-on: ubuntu-latest
    # Uses the "production" environment so DATABASE_URL comes from the scoped
    # environment secret, not a loose repository-level secret.
    environment: production
    steps:
      - name: Confirm intent
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "seed" ]; then
            echo "Confirmation must be exactly the word 'seed'. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed
        run: bun run db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
