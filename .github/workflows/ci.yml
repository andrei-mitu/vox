name: CI / CD

# ─── GitHub Setup (one-time, done in the GitHub UI) ──────────────────────────
#
# 1. Create a "production" environment:
#    GitHub → repo Settings → Environments → New environment → "production"
#    Recommended protection: Deployment branches → select "master" only.
#
# 2. Add these secrets to the "production" environment:
#    (Settings → Environments → production → Environment secrets)
#
#    DATABASE_URL     Production postgres connection string.
#                     Format: postgresql://USER:PASS@HOST:5432/DB
#                     Used by GitHub Actions to run migrations before deploy.
#                     Also set as DATABASE_URL on the server's /opt/vox/.env.
#
#    SERVER_HOST      IP address or hostname of the production server.
#
#    SERVER_USER      SSH username on the server (e.g. "ubuntu", "deploy").
#
#    SERVER_SSH_KEY   Private SSH key for the deploy user.
#                     Paste the full PEM content (-----BEGIN...-----END...).
#                     Add the matching public key to ~/.ssh/authorized_keys on
#                     the server.
#
# 3. Server setup (one-time):
#    a) Install Docker (with the Compose plugin): https://docs.docker.com/engine/install
#    b) mkdir -p /opt/vox
#    c) Copy docker-compose.prod.yml to /opt/vox/docker-compose.yml
#    d) Create /opt/vox/.env:
#         DATABASE_URL=postgresql://...
#         JWT_SECRET=$(openssl rand -base64 32)
#
# 4. Protect the master branch:
#    Settings → Branches → Add rule → require status checks to pass:
#    "Typecheck & Lint", "Next.js Build", "Docker Build"
#
# ─────────────────────────────────────────────────────────────────────────────

# GITHUB_TOKEN needs write access to packages to push the image to ghcr.io.
permissions:
  contents: read
  packages: write

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Static checks (fast) ───────────────────────────────────────────
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  # ── Job 2: Next.js build ──────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # DB connection is lazy — next build never opens a real connection.
          # Safe placeholders that satisfy any import-time env presence checks.
          # Real values are never passed to the build — see Dockerfile comments.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/vox
          JWT_SECRET: ci-build-placeholder-not-real

  # ── Job 3: Docker build → push image to ghcr.io on master ────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login is required both to push (master) and to read the layer cache (PRs).
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Immutable tag per commit — safe to use for rollbacks
            type=sha,prefix=sha-
            # Mutable "latest" tag — only set on master, used by the server
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push only when merging to master; PRs only validate the build.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to production (master only, after all CI jobs pass) ─────
  # Pipeline:
  #   1. Run DB migrations (schema always ahead of running code)
  #   2. Log in to ghcr.io on the server using GITHUB_TOKEN
  #   3. Pull the new image
  #   4. Recreate the container; wait for the healthcheck to pass
  #   5. Prune dangling images
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [check, build, docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Migrations run before the new container starts — schema is always in sync.
      - name: Run database migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key

      # Pipe the short-lived GITHUB_TOKEN to docker login on the server.
      # This is enough time to pull the image — no long-lived credentials stored.
      - name: Authenticate Docker on server
        env:
          SERVER: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
        run: |
          printf '%s' "${{ secrets.GITHUB_TOKEN }}" | \
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" \
                "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

      # Pull the image that was pushed in the docker job above, then recreate
      # the container. --wait blocks until the healthcheck passes (or fails).
      - name: Deploy container
        env:
          SERVER: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SERVER" "
            cd /opt/vox &&
            docker compose pull app &&
            docker compose up -d --wait app &&
            docker image prune -f
          "
