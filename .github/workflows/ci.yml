name: CI / CD

# ─── GitHub Setup (one-time, done in the GitHub UI) ──────────────────────────
#
# 1. Create a "production" environment:
#    GitHub → repo Settings → Environments → New environment → "production"
#    Recommended protection: Deployment branches → select "master" only.
#
# 2. Add these secrets to the "production" environment:
#    (Settings → Environments → production → Environment secrets)
#
#    DATABASE_URL     Production postgres connection string.
#                     Format: postgresql://USER:PASS@HOST:5432/DB
#                     Used here to run migrations before deploy.
#                     The same value must also be set via `fly secrets set`.
#
#    FLY_API_TOKEN    Deploy token from: fly tokens create deploy -x 999999h
#
# 3. One-time Fly.io setup — see fly.toml for full instructions.
#
# 4. Protect the master branch:
#    Settings → Branches → Add rule → require status checks to pass:
#    "Typecheck & Lint", "Next.js Build", "Docker Build"
#
# ─────────────────────────────────────────────────────────────────────────────

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Static checks (fast) ───────────────────────────────────────────
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  # ── Job 2: Next.js build ──────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # DB connection is lazy — next build never opens a real connection.
          # Safe placeholders; real values live in Fly secrets (runtime only).
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/vox
          JWT_SECRET: ci-build-placeholder-not-real

  # ── Job 3: Docker build — validates the Dockerfile end-to-end ─────────────
  # This is the gate: if the image doesn't build, nothing deploys.
  # Fly.io builds the image again remotely during deploy (using its own cache),
  # so there is no push step here — just validation.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to production (master only, after all CI jobs pass) ─────
  # Pipeline:
  #   1. Run DB migrations (schema is always ahead of the running code)
  #   2. flyctl deploy --remote-only  (Fly builds on its remote builders and
  #      rolls out the new container; waits for health checks to pass)
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [check, build, docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ env.FLY_APP }}.fly.dev

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Migrations run before the new container goes live.
      # Drizzle tracks applied migrations — re-running is always safe.
      - name: Run database migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Fly builds the image on its remote builders (using the Dockerfile),
      # then rolls out the new version and waits for health checks to pass.
      # If the build or health check fails, the old version keeps running.
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
