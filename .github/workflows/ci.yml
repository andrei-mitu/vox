name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Static checks (runs on every push and every PR) ──────────────────────
  test:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  # ── 2. Build Docker image & deploy (push to main only) ─────────────────────
  #
  #  • "needs: test" means this job is skipped if typecheck or lint fails.
  #  • flyctl deploy --remote-only ships the source to Fly.io, which builds
  #    the Docker image on their infra.  If the build fails the job fails and
  #    no new release is created.
  #  • The release_command in fly.toml runs "bun run db:migrate" inside the
  #    new image before traffic is switched over.
  #
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build image & deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
