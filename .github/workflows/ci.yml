name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel any in-flight deploy when a newer push to main arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Static checks (runs on every push and every PR) ──────────────────────
  test:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"   # pin to match oven/bun:1.2.23-alpine in Dockerfile

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx eslint

  # ── 2. Build Docker image & deploy (push to main only) ─────────────────────
  #
  #  • "needs: test" means this job is skipped if typecheck or lint fails.
  #  • flyctl deploy --remote-only ships the source to Fly.io, which builds
  #    the Docker image on their infra.  If the build fails the job fails and
  #    no new release is created.
  #  • The release_command in fly.toml runs "bun run db:migrate" inside the
  #    new image before traffic is switched over.
