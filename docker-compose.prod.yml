# Production server configuration.
#
# One-time server setup:
#   mkdir -p /opt/vox
#   cp docker-compose.prod.yml /opt/vox/docker-compose.yml
#   nano /opt/vox/.env            # add DATABASE_URL and JWT_SECRET
#
# The CI/CD pipeline handles all subsequent deployments automatically.
# To manually redeploy (e.g. after a rollback):
#   docker compose pull app
#   docker compose up -d --wait app
#   docker image prune -f
#
# /opt/vox/.env must contain:
#   DATABASE_URL=postgresql://USER:PASS@HOST:5432/DB
#   JWT_SECRET=<openssl rand -base64 32>

services:
  app:
    image: ghcr.io/andrei-mitu/vox:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Reads DATABASE_URL and JWT_SECRET from /opt/vox/.env
    env_file: .env
    healthcheck:
      test: >
        CMD-SHELL node -e
        "require('http').get('http://localhost:3000',r=>r.statusCode<500?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
